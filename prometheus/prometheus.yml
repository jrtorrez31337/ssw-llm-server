global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: sswai

scrape_configs:
  - job_name: vllm-workers
    static_configs:
      - targets:
          - model-0:8000
          - model-1:8000
          - model-2:8000
          - model-3:8000
    relabel_configs:
      # Trim port so legend shows "model-0" not "model-0:8000"
      - source_labels: [__address__]
        regex: '([^:]+):\d+'
        target_label: instance
        replacement: '$1'
